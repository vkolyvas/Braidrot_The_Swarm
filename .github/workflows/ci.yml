name: CI - Test, Security & Lint

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  security:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run security audit
        run: |
          echo "=== Security Audit ==="

          # Check for hardcoded credentials
          echo "Checking for hardcoded credentials..."
          if grep -r "password\s*=" *.lua 2>/dev/null; then
            echo "WARNING: Possible hardcoded password found"
          else
            echo "PASS: No hardcoded credentials"
          fi

          # Check for dangerous functions
          echo "Checking for eval usage..."
          if grep -r "eval(" *.lua 2>/dev/null; then
            echo "WARNING: eval() usage detected"
          else
            echo "PASS: No eval usage"
          fi

          echo "Checking for os.execute..."
          if grep -r "os\.execute" *.lua 2>/dev/null; then
            echo "WARNING: os.execute() detected"
          else
            echo "PASS: No os.execute"
          fi

          echo "Checking for loadstring..."
          if grep -r "loadstring" *.lua 2>/dev/null; then
            echo "WARNING: loadstring() detected"
          else
            echo "PASS: No loadstring"
          fi

          echo "=== Security Audit Complete ==="

  code-quality:
    name: Code Quality
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check file structure
        run: |
          echo "=== File Structure ==="
          echo "Lua modules: $(ls *.lua | wc -l)"
          echo "Total lines: $(wc -l *.lua | tail -1)"
          echo "=== Complete ==="

      - name: Check for TODO/FIXME
        run: |
          echo "=== TODO/FIXME Check ==="
          if grep -r "TODO\|FIXME\|HACK\|XXX" *.lua 2>/dev/null; then
            echo "Found TODO/FIXME"
          else
            echo "PASS: No TODO/FIXME found"
          fi

  formatting:
    name: Code Formatting
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check indentation
        run: |
          echo "=== Indentation Check ==="
          for file in *.lua; do
            if grep -q $'\t' "$file"; then
              echo "WARNING: $file contains tabs"
            fi
          done
          echo "PASS: Checked for tabs"

      - name: Check line endings
        run: |
          echo "=== Line Ending Check ==="
          if file *.lua | grep -v "UTF-8" | grep -q "ASCII"; then
            echo "Some files may have non-UTF-8 encoding"
          else
            echo "PASS: All files UTF-8/ASCII"
          fi

  dependencies:
    name: Dependency Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check dependencies
        run: |
          echo "=== Dependency Check ==="
          echo "Checking require statements..."
          grep -h "require(" *.lua | sort -u | head -5 || echo "No external requires"

          echo ""
          echo "ModuleScript references:"
          grep -l "ModuleScript" *.lua 2>/dev/null | wc -l

  build-summary:
    name: Build Summary
    needs: [security, code-quality, formatting, dependencies]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Summary
        run: |
          echo "=== CI Build Summary ==="
          echo "All checks completed!"
          echo ""
          echo "Files analyzed: $(ls *.lua | wc -l)"
          echo "Total lines: $(wc -l *.lua | tail -1 | awk '{print $1}')"
